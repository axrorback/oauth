<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ro‘yxatdan o‘tish yopilgan | CODERBOYS Auth</title>

  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    :root {
      --bg: #f5f7f9;
      --card-bg: #ffffff;
      --text: #24292f;
      --danger: #cf222e;
      --border: #d0d7de;
      --terminal-head: #eef1f4;
      --font-mono: 'JetBrains Mono', monospace;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }

    .container-box {
      max-width: 500px;
      width: 100%;
      padding: 20px;
    }

    .terminal-window {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 15px 35px rgba(0,0,0,0.05);
    }

    .terminal-header {
      background: var(--terminal-head);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .terminal-dots { display: flex; gap: 6px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot-1 { background: #ff5f56; }
    .dot-2 { background: #ffbd2e; }
    .dot-3 { background: #27c93f; }

    .terminal-body {
      padding: 45px 30px;
      text-align: center;
    }

    .status-icon {
      font-size: 3.5rem;
      color: var(--danger);
      margin-bottom: 20px;
    }

    .terminal-alert {
      background: #fff1f0;
      border: 1px solid rgba(207, 34, 46, 0.1);
      padding: 20px;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #24292f;
      margin-bottom: 25px;
      line-height: 1.6;
    }

    .terminal-cursor {
      display: inline-block;
      width: 8px;
      height: 18px;
      background: var(--danger);
      vertical-align: middle;
      animation: blink 1s infinite;
      margin-left: 5px;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .btn-home {
      color: #656d76;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: 0.2s;
    }

    .btn-home:hover {
      color: var(--text);
    }
  </style>
</head>
<body>

<div class="container-box">
  <div class="terminal-window">
    <div class="terminal-header">
      <div class="terminal-dots">
        <div class="dot dot-1"></div>
        <div class="dot dot-2"></div>
        <div class="dot dot-3"></div>
      </div>
      <div style="font-size: 0.75rem; color: #656d76;">
        <i class="bi bi-exclamation-octagon"></i> registration_status.log
      </div>
    </div>

    <div class="terminal-body">
      <div class="status-icon">
        <i class="bi bi-slash-circle"></i>
      </div>

      <h2 class="fs-5 mb-3">Tizim xabari:</h2>

      <div class="terminal-alert">
        <strong>Kechirasiz!</strong> Hozirda yangi foydalanuvchilarni ro'yxatga olish to'xtatilgan.<span class="terminal-cursor"></span>
      </div>

      <div class="mt-2">
        <a href="/" class="btn-home">
          <i class="bi bi-arrow-left"></i> Bosh sahifaga qaytish
        </a>
      </div>
    </div>
  </div>

  <p class="text-center mt-4 text-muted small">
    Agar bu xatolik deb o'ylasangiz, administrator bilan bog'laning.
  </p>
</div>

</body>
</html>
