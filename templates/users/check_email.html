<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tasdiqlash kutilmoqda | CODERBOYS Auth</title>

  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    :root {
      --bg: #f5f7f9;
      --card-bg: #ffffff;
      --text: #24292f;
      --primary: #1a7f37;
      --warning: #9a6700;
      --border: #d0d7de;
      --terminal-head: #eef1f4;
      --font-mono: 'JetBrains Mono', monospace;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }

    .message-container {
      max-width: 500px;
      width: 100%;
      padding: 20px;
    }

    .terminal-window {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 15px 35px rgba(0,0,0,0.05);
    }

    .terminal-header {
      background: var(--terminal-head);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .terminal-dots { display: flex; gap: 6px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot-1 { background: #ff5f56; }
    .dot-2 { background: #ffbd2e; }
    .dot-3 { background: #27c93f; }

    .terminal-body {
      padding: 40px 30px;
      text-align: center;
    }

    .info-icon {
      font-size: 3rem;
      color: var(--warning);
      margin-bottom: 20px;
    }

    .email-highlight {
      background: #fff8c5;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 600;
      color: var(--warning);
      word-break: break-all;
    }

    .instruction-box {
      background: #f6f8fa;
      padding: 20px;
      border-radius: 8px;
      font-size: 0.9rem;
      color: #24292f;
      margin: 20px 0;
      border: 1px solid var(--border);
      line-height: 1.6;
    }

    .btn-back {
      color: #656d76;
      text-decoration: none;
      font-size: 0.85rem;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: 0.2s;
    }

    .btn-back:hover {
      color: var(--primary);
    }
  </style>
</head>
<body>

<div class="message-container">
  <div class="terminal-window">
    <div class="terminal-header">
      <div class="terminal-dots">
        <div class="dot dot-1"></div>
        <div class="dot dot-2"></div>
        <div class="dot dot-3"></div>
      </div>
      <div style="font-size: 0.75rem; color: #656d76;">
        <i class="bi bi-info-circle"></i> account_verification.msg
      </div>
    </div>

    <div class="terminal-body">
      <div class="info-icon">
        <i class="bi bi-envelope-exclamation"></i>
      </div>

      <h2 class="fs-5 mb-3">Tasdiqlash kutilmoqda</h2>

      <div class="instruction-box">
        Hurmatli foydalanuvchi, iltimos <span class="email-highlight">{{ email }}</span> manziliga yuborilgan link yordamida akkauntingizni tasdiqlashingizni so'raymiz.
      </div>

      <div class="mt-4">
        <a href="{% url 'login' %}" class="btn-back">
          <i class="bi bi-arrow-left"></i> Kirish sahifasiga qaytish
        </a>
      </div>
    </div>
  </div>

  <p class="text-center mt-4 text-muted small">
    Linkni topa olmasangiz, "Spam" papkasini tekshirib ko'ring.
  </p>
</div>

</body>
</html>
