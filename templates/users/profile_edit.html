<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Profilni tahrirlash | CODERBOYS Auth</title>

  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    :root {
      --bg: #f5f7f9;
      --card-bg: #ffffff;
      --text: #24292f;
      --primary: #1a7f37;
      --border: #d0d7de;
      --terminal-head: #eef1f4;
      --font-mono: 'JetBrains Mono', monospace;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px 0;
    }

    .edit-container {
      max-width: 550px;
      width: 100%;
      padding: 15px;
    }

    .terminal-window {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 15px 35px rgba(0,0,0,0.05);
    }

    .terminal-header {
      background: var(--terminal-head);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .terminal-dots { display: flex; gap: 6px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot-1 { background: #ff5f56; }
    .dot-2 { background: #ffbd2e; }
    .dot-3 { background: #27c93f; }

    .terminal-body { padding: 30px; }

    /* Form styling */
    .form-section-title {
      font-size: 0.8rem;
      color: #6e7781;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .form-section-title::after {
      content: "";
      flex-grow: 1;
      height: 1px;
      background: var(--border);
    }

    .edit-form p {
      margin-bottom: 15px;
    }

    .edit-form label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      color: #57606a;
    }

    .edit-form input, .edit-form textarea, .edit-form select {
      display: block;
      width: 100%;
      padding: 10px 12px;
      font-size: 0.9rem;
      font-family: var(--font-mono);
      background-color: #fafbfc;
      border: 1px solid var(--border);
      border-radius: 6px;
      transition: 0.2s;
    }

    .edit-form input:focus, .edit-form textarea:focus {
      outline: none;
      border-color: var(--primary);
      background-color: #fff;
      box-shadow: 0 0 0 3px rgba(26, 127, 55, 0.1);
    }

    .edit-form textarea { min-height: 80px; resize: vertical; }

    /* File input custom style */
    input[type="file"] {
      padding: 5px;
      font-size: 0.8rem;
    }

    .btn-save {
      background: var(--primary);
      color: white;
      border: 1px solid rgba(27, 31, 36, 0.15);
      width: 100%;
      padding: 12px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 20px;
    }

    .btn-save:hover {
      background: #166e30;
      transform: translateY(-1px);
    }

    .footer-links {
      text-align: center;
      margin-top: 20px;
      font-size: 0.85rem;
    }
    .footer-links a { color: #6e7781; text-decoration: none; }
    .footer-links a:hover { color: var(--text); text-decoration: underline; }
  </style>
</head>
<body>

<div class="edit-container">
  <div class="terminal-window">
    <div class="terminal-header">
      <div class="terminal-dots">
        <div class="dot dot-1"></div>
        <div class="dot dot-2"></div>
        <div class="dot dot-3"></div>
      </div>
      <div style="font-size: 0.75rem; color: #656d76;">
        <i class="bi bi-gear"></i> update_profile.sh
      </div>
    </div>

    <div class="terminal-body">
      <h2 class="fs-5 mb-4">CBoys@Auth:~$ ./edit-profile</h2>

      <form method="post" enctype="multipart/form-data" class="edit-form">
        {% csrf_token %}

        <div class="form-section-title">Asosiy ma'lumotlar</div>
        <div class="mb-4">
          {{ user_form.as_p }}
        </div>

        <div class="form-section-title">Profil ma'lumotlari</div>
        <div class="mb-2">
          {{ profile_form.as_p }}
        </div>

        <button type="submit" class="btn-save">
          <i class="bi bi-cloud-arrow-up"></i> O'zgarishlarni saqlash
        </button>
      </form>
    </div>
  </div>

  <div class="footer-links">
    <a href="{% url 'profile' %}">
      <i class="bi bi-arrow-left"></i> Saqlamasdan orqaga qaytish
    </a>
  </div>
</div>

</body>
</html>
