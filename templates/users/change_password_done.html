<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Parol o'zgartirildi | CODERBOYS Auth</title>

  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    :root {
      --bg: #f5f7f9;
      --card-bg: #ffffff;
      --text: #24292f;
      --primary: #1a7f37;
      --border: #d0d7de;
      --terminal-head: #eef1f4;
      --font-mono: 'JetBrains Mono', monospace;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }

    .status-container {
      max-width: 450px;
      width: 100%;
      padding: 20px;
    }

    .terminal-window {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 15px 35px rgba(0,0,0,0.05);
    }

    .terminal-header {
      background: var(--terminal-head);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .terminal-dots { display: flex; gap: 6px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot-1 { background: #ff5f56; }
    .dot-2 { background: #ffbd2e; }
    .dot-3 { background: #27c93f; }

    .terminal-body {
      padding: 40px 30px;
      text-align: center;
    }

    .success-icon {
      font-size: 3.5rem;
      color: var(--primary);
      margin-bottom: 20px;
    }

    .success-text {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .terminal-log {
      background: #f6f8fa;
      padding: 10px;
      border-radius: 6px;
      font-size: 0.8rem;
      color: #57606a;
      margin-bottom: 25px;
      border: 1px solid var(--border);
    }

    .btn-login {
      background: var(--primary);
      color: white;
      text-decoration: none;
      display: inline-block;
      width: 100%;
      padding: 12px;
      border-radius: 6px;
      font-weight: 600;
      transition: 0.2s;
    }

    .btn-login:hover {
      background: #166e30;
      color: white;
      transform: translateY(-1px);
    }
  </style>
</head>
<body>

<div class="status-container">
  <div class="terminal-window">
    <div class="terminal-header">
      <div class="terminal-dots">
        <div class="dot dot-1"></div>
        <div class="dot dot-2"></div>
        <div class="dot dot-3"></div>
      </div>
      <div style="font-size: 0.75rem; color: #656d76;">
        <i class="bi bi-check-all"></i> system_msg.log
      </div>
    </div>

    <div class="terminal-body">
      <div class="success-icon">
        <i class="bi bi-patch-check-fill"></i>
      </div>

      <div class="success-text">Muvaffaqiyatli!</div>

      <div class="terminal-log">
        [OK] Parol yangilandi.<br>
        [OK] Sessiya yangilandi.
      </div>

      <a href="{% url 'login' %}" class="btn-login">
        <i class="bi bi-box-arrow-in-right"></i> Tizimga kirish
      </a>
    </div>
  </div>
</div>

</body>
</html>
