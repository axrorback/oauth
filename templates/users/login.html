<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | CODERBOYS Auth</title>

  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    :root {
      --bg: #f5f7f9;
      --card-bg: #ffffff;
      --text: #24292f;
      --primary: #1a7f37;
      --border: #d0d7de;
      --terminal-head: #eef1f4;
      --font-mono: 'JetBrains Mono', monospace;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }

    .auth-container {
      max-width: 420px;
      width: 100%;
      padding: 20px;
    }

    .terminal-window {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 15px 35px rgba(0,0,0,0.05);
    }

    .terminal-header {
      background: var(--terminal-head);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .terminal-dots { display: flex; gap: 6px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot-1 { background: #ff5f56; }
    .dot-2 { background: #ffbd2e; }
    .dot-3 { background: #27c93f; }

    .terminal-body { padding: 35px 30px; }

    .auth-form p { margin-bottom: 18px; }

    .auth-form input {
      display: block;
      width: 100%;
      padding: 10px 12px;
      font-size: 0.9rem;
      font-family: var(--font-mono);
      background-color: #fafbfc;
      border: 1px solid var(--border);
      border-radius: 6px;
      transition: 0.2s;
    }

    .auth-form input:focus {
      outline: none;
      border-color: var(--primary);
      background-color: #fff;
      box-shadow: 0 0 0 3px rgba(26, 127, 55, 0.1);
    }

    .auth-form label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      color: #57606a;
    }

    .btn-submit {
      background: var(--primary);
      color: white;
      border: 1px solid rgba(27, 31, 36, 0.15);
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 10px;
    }

    .btn-submit:hover {
      background: #166e30;
      transform: translateY(-1px);
    }

    .messages { list-style: none; padding: 0; margin-bottom: 20px; }
    .error { color: #cf222e; background: #ffebe9; padding: 10px; border-radius: 6px; font-size: 0.85rem; border: 1px solid rgba(207, 34, 46, 0.1); }

    .footer-links {
      text-align: center;
      margin-top: 20px;
      font-size: 0.85rem;
    }

    .footer-links a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>

<div class="auth-container">
  <div class="terminal-window">
    <div class="terminal-header">
      <div class="terminal-dots">
        <div class="dot dot-1"></div>
        <div class="dot dot-2"></div>
        <div class="dot dot-3"></div>
      </div>
      <div style="font-size: 0.75rem; color: #656d76;">
        <i class="bi bi-shield-lock"></i> users/login.py
      </div>
    </div>

    <div class="terminal-body">
      <h2 class="fs-5 mb-4">coderboys@auth:~$ ./login/</h2>

      {% if messages %}
        <ul class="messages">
          {% for message in messages %}
            <li class="{{ message.tags }}">{{ message }}</li>
          {% endfor %}
        </ul>
      {% endif %}

      <form method="post" class="auth-form">
        {% csrf_token %}

        <div class="form-content">
            {{ form.as_p }}
        </div>

        <button type="submit" class="btn-submit">
          <i class="bi bi-door-open"></i> Tizimga kirish
        </button>
      </form>
    </div>
  </div>

  <div class="footer-links">
    <span class="text-muted">Accountingiz yo'qmi?</span>
    <a href="{% url 'register' %}">Ro'yxatdan o'tish</a>
  </div>
</div>

</body>
</html>
